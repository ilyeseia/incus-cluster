---
# تهيئة أساسية لجميع العقد

- name: تحديث فهرس الحزم
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: تثبيت الحزم الأساسية
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - ca-certificates
      - apt-transport-https
      - python3-apt
    state: present

- name: ضبط اسم المضيف ليطابق اسم العقدة
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: إضافة جميع العقد إلى /etc/hosts (عبر Tailscale)
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^{{ hostvars[item].tailscale_ip }}\\s"
    line: "{{ hostvars[item].tailscale_ip }} {{ item }}"
  loop: "{{ groups['incus_cluster'] }}"

- name: ضبط معاملات النواة اللازمة للحاويات
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-incus.conf
    mode: "0644"
    content: |
      fs.inotify.max_user_instances = 1024
      fs.inotify.max_queued_events = 1048576
      fs.inotify.max_user_watches = 1048576
      vm.max_map_count = 262144
      kernel.keys.maxkeys = 2000
  register: sysctl_conf

- name: تطبيق معاملات النواة
  ansible.builtin.command: sysctl --system
  when: sysctl_conf.changed
